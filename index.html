<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Gestión Personal</title>

<style>
:root{
  --bg:#0f1115;
  --card:#141a24;
  --stroke:rgba(255,255,255,.08);
  --text:#e8ecf6;
  --muted:rgba(232,236,246,.6);
  --brand:#7aa2ff;
  --good:#44d07b;
  --bad:#ff5b6b;
}

*{box-sizing:border-box}

html,body{
  height:100%;
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  overflow-x:hidden;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:20px 16px 60px;
}

h1,h2{margin:0}

.top{
  position:sticky;
  top:0;
  background:var(--bg);
  padding:16px;
  border-bottom:1px solid var(--stroke);
  z-index:20;
}

.nav{
  margin-top:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.tab{
  padding:10px 14px;
  border-radius:30px;
  border:1px solid var(--stroke);
  background:#161d29;
  cursor:pointer;
  font-weight:700;
}

.tab.active{
  background:rgba(122,162,255,.15);
  border-color:rgba(122,162,255,.4);
}

.card{
  background:var(--card);
  border:1px solid var(--stroke);
  border-radius:18px;
  padding:18px;
  margin-top:18px;
}

.kpis{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.kpi{
  background:#101722;
  padding:14px;
  border-radius:14px;
}

.value{
  font-size:22px;
  font-weight:900;
  margin-top:6px;
}

.good{color:var(--good)}
.bad{color:var(--bad)}

.btn{
  padding:14px 16px;
  border-radius:16px;
  border:1px solid var(--stroke);
  background:#1b2330;
  color:var(--text);
  font-weight:900;
  cursor:pointer;
  transition:.08s;
}

.btn:active{
  transform:scale(.95);
}

.btn.good{background:rgba(68,208,123,.15)}
.btn.bad{background:rgba(255,91,107,.15)}
.btn.primary{background:rgba(122,162,255,.18)}

.btnRow{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.listItem{
  padding:14px;
  border-radius:14px;
  background:#101722;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.tableWrap{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:700px;
}

td{
  padding:10px;
  border-bottom:1px solid var(--stroke);
}

.right{text-align:right}

.modalWrap{
  position:fixed;
  inset:0;
  background:var(--bg);
  display:none;
  z-index:100;
}

.modal{
  height:100%;
  overflow-y:auto;
}

.modalHeader{
  position:sticky;
  top:0;
  background:var(--bg);
  padding:18px;
  border-bottom:1px solid var(--stroke);
}

.modalBody{
  padding:20px;
  padding-bottom:80px;
}

.input,select{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:#101722;
  color:var(--text);
  margin-bottom:12px;
}

</style>
</head>

<body>

<div class="top">
  <h1>💰 Gestión Personal</h1>
  <div class="nav">
    <div class="tab active" onclick="setView('dashboard')">Dashboard</div>
    <div class="tab" onclick="setView('movs')">Movimientos</div>
  </div>
</div>

<div class="wrap">

<section id="dashboard">

<div class="card">
  <div class="btnRow">
    <button class="btn good" onclick="openSheet('in')">➕ Entrada</button>
    <button class="btn bad" onclick="openSheet('out')">➖ Salida</button>
  </div>
</div>

<div class="card">
  <div class="kpis">
    <div class="kpi">
      Entradas mes
      <div class="value good" id="kIn">$ 0</div>
    </div>
    <div class="kpi">
      Salidas mes
      <div class="value bad" id="kOut">$ 0</div>
    </div>
    <div class="kpi">
      Neto
      <div class="value" id="kNet">$ 0</div>
    </div>
    <div class="kpi">
      Tarjeta a pagar
      <div class="value bad" id="kCard">$ 0</div>
    </div>
  </div>
</div>

</section>

<section id="movs" style="display:none">

<div class="card">
  <div class="tableWrap">
    <table id="movTable"></table>
  </div>
</div>

</section>

</div>

<div class="modalWrap" id="sheet">
  <div class="modal">
    <div class="modalHeader">
      <h2 id="sheetTitle"></h2>
      <button class="btn" onclick="closeSheet()">Cerrar</button>
    </div>
    <div class="modalBody" id="sheetBody"></div>
  </div>
</div>

<script>

let data = {
  movements:[],
  cardDebt:0
};

function money(n){
  return "$ " + n.toLocaleString("es-AR");
}

function setView(v){
  document.getElementById("dashboard").style.display = v==="dashboard"?"":"none";
  document.getElementById("movs").style.display = v==="movs"?"":"none";
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab")[v==="dashboard"?0:1].classList.add("active");
}

function openSheet(type){
  document.body.style.overflow="hidden";
  document.getElementById("sheet").style.display="block";
  document.getElementById("sheetTitle").innerText = type==="in"?"Nueva Entrada":"Nueva Salida";

  document.getElementById("sheetBody").innerHTML = `
    <input class="input" id="amount" placeholder="$ 20.000" inputmode="numeric">
    <button class="btn primary" onclick="saveMovement('${type}')">Guardar</button>
  `;
}

function closeSheet(){
  document.body.style.overflow="auto";
  document.getElementById("sheet").style.display="none";
}

function saveMovement(type){
  let amount = parseInt(document.getElementById("amount").value.replace(/\D/g,'')) || 0;
  if(!amount) return alert("Monto inválido");

  data.movements.push({type,amount});

  if(type==="out"){
    data.cardDebt += amount;
  }

  closeSheet();
  render();
}

function render(){
  let inTotal=0;
  let outTotal=0;

  data.movements.forEach(m=>{
    if(m.type==="in") inTotal+=m.amount;
    else outTotal+=m.amount;
  });

  document.getElementById("kIn").innerText = money(inTotal);
  document.getElementById("kOut").innerText = money(outTotal);
  document.getElementById("kNet").innerText = money(inTotal-outTotal);
  document.getElementById("kCard").innerText = money(data.cardDebt);

  let table = data.movements.map(m=>`
    <tr>
      <td>${m.type==="in"?"Entrada":"Salida"}</td>
      <td class="right">${money(m.amount)}</td>
    </tr>
  `).join("");

  document.getElementById("movTable").innerHTML = table;
}

render();

</script>

</body>
</html>
